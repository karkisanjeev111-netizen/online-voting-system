{% extends "base.html" %}
{% block title %}Edit Candidate{% endblock %}
{% block content %}
<h2>✏️ Edit Candidate</h2><hr>
<form method="POST">
    <div class="mb-3">
        <label class="form-label">Name</label>
        <input type="text" name="name" class="form-control" value="{{ candidate.name }}" required>
    </div>
    <div class="mb-3">
        <label class="form-label">Party</label>
        <input type="text" name="party" class="form-control" value="{{ candidate.party or '' }}">
    </div>
    <div class="mb-3">
        <label class="form-label">Description</label>
        <textarea name="description" class="form-control" rows="3">{{ candidate.description or '' }}</textarea>
    </div>
    <div class="mb-3">
        <label class="form-label">Election</label>
        <select name="election_id" class="form-control" required>
            {% for e in elections %}
            <option value="{{ e.id }}" {% if e.id == candidate.election_id %}selected{% endif %}>{{ e.title }}</option>
            {% endfor %}
        </select>
    </div>
    <button type="submit" class="btn btn-primary">Update Candidate</button>
    <a href="{{ url_for('admin.manage_candidates') }}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
