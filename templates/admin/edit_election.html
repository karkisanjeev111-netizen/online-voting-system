{% extends "base.html" %}
{% block title %}Edit Election{% endblock %}
{% block content %}
<h2>✏️ Edit Election</h2><hr>
<form method="POST">
    <div class="mb-3">
        <label class="form-label">Title</label>
        <input type="text" name="title" class="form-control" value="{{ election.title }}" required>
    </div>
    <div class="mb-3">
        <label class="form-label">Description</label>
        <textarea name="description" class="form-control" rows="3">{{ election.description }}</textarea>
    </div>
    <div class="row">
        <div class="col-md-6 mb-3">
            <label class="form-label">Start Date & Time</label>
            <input type="datetime-local" name="start_date" class="form-control" 
                   value="{{ election.start_date.strftime('%Y-%m-%dT%H:%M') }}" required>
        </div>
        <div class="col-md-6 mb-3">
            <label class="form-label">End Date & Time</label>
            <input type="datetime-local" name="end_date" class="form-control" 
                   value="{{ election.end_date.strftime('%Y-%m-%dT%H:%M') }}" required>
        </div>
    </div>
    <div class="mb-3 form-check">
        <input type="checkbox" name="is_active" class="form-check-input" 
               {% if election.is_active %}checked{% endif %}>
        <label class="form-check-label">Active</label>
    </div>
    <button type="submit" class="btn btn-primary">Update Election</button>
    <a href="{{ url_for('admin.manage_elections') }}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
