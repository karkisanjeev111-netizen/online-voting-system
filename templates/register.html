{% extends "base.html" %}
{% block title %}Register - Online Voting System{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card shadow-lg border-0 rounded-4">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <div class="display-4 mb-2">📝</div>
                    <h2 class="fw-bold">Create Account</h2>
                    <p class="text-muted">Join and make your voice heard</p>
                </div>
                
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">👤 Username</label>
                        <input type="text" name="username" class="form-control" placeholder="Choose a username" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">📧 Email Address</label>
                        <input type="email" name="email" class="form-control" placeholder="Enter your email" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">🔒 Password</label>
                        <input type="password" name="password" class="form-control" placeholder="Create a strong password" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 btn-lg rounded-pill">📝 Create Account</button>
                </form>
                
                <div class="text-center mt-4">
                    <p>Already have an account? <a href="{{ url_for('auth.login') }}" class="fw-bold">Login here</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
